name: BNI 3-Day Follow-Up Emails

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 9:00 AM EST (14:00 UTC)
  workflow_dispatch:       # Run manually anytime from Actions tab

jobs:
  send-followups:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Send 3-day follow-up emails
        run: python scheduler/followup_emails.py
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

name: Weekly BNI Visitor Report

on:
  schedule:
    - cron: '30 12 * * 1'   # Every Monday at 8:30 AM EST (12:30 UTC)
  workflow_dispatch:          # Run manually anytime from the Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Send weekly visitor report
        run: python scheduler/weekly_report.py
        env:
          GOOGLE_CREDS:       ${{ secrets.GOOGLE_CREDS }}
          SHEET_NAME:         ${{ secrets.SHEET_NAME }}
          REPORT_EMAIL:       ${{ secrets.REPORT_EMAIL }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
